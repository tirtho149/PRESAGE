# bugwood_pathome_smoke.yaml
# ===========================
# Two-crop smoke config (Soybean + Tomato).

data:
  csv_path: "smoke/BugWood_Diseases_smoke_usable.csv"
  image_cache_dir: "smoke/.bugwood_cache"
  min_per_class: 3

  download:
    enabled: true
    timeout: 20
    retries: 2

  quality_filters:
    min_side: 256
    require_state: true
    require_disease_label: true

model:
  backbone:       "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature:    0.8
  max_new_tokens: 256                  # halved from production
  vllm_base_url:  "http://localhost:8000/v1"
  vllm_timeout:   180

# Smoke uses smaller N + K so a 2-crop run finishes in ~30 min on one A100.
swarm:
  n_runs:                5             # production: 10
  agreement_min:         2             # K — keep ≥2-of-5
  similarity_threshold:  0.4
  Tmax:                  8             # halved from 15
  max_backtracks:        1
  max_parallel_tuples:   2
  parallel_runs_per_tuple: true
