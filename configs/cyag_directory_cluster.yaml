# CyAg folder tree on a machine where Curated_Dataset/Images is available.
# Example: Images/<crop>/<disease>/photo.jpg  -> T5 / T3 from path segments.
# Set directory_root to your absolute path (or export CYAG_IMAGE_ROOT if your loader supports it).

data:
  parquet_path: null
  directory_root: "/work/mech-ai-scratch/tirtho/CyAg/Curated_Dataset/Images"
  directory_layout:
    segment_tasks: null
  image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".bmp", ".tif", ".tiff"]
  follow_symlinks: false
  image_root: null
  id_col: "id"
  image_col: "image_path"
  label_cols:
    T1: "symptom_type"
    T2: "pathogen_class"
    T3: "disease_name"
    T4: "severity_class"
    T5: "crop_species"
  demographic_cols: {}
  quality_col: "img_quality"
  quality_filter: null
  n_images: 10000
  calibration_split_size: 500
  stratify_by: ["crop_species", "severity_class"]
  top_k_diseases: 50

labels:
  T1: null
  T2: null
  T3: null
  T4: null
  T5: null

model:
  backbone: "Qwen/Qwen3-VL-8B-Instruct"
  replica_backbones:
    - "microsoft/Phi-4-multimodal-instruct"
    - "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.0
  seed: 42
  max_new_tokens: 512
  image_size: 448
  vllm_base_url: "http://localhost:8000/v1"
  logprobs: true
  guided_choice: true

routing:
  orchestrator: "autogen_swarm"
  Tmax: 15
  confidence_levels: ["high", "medium", "low"]
  confidence_weights:
    high: 3
    medium: 2
    low: 1
  allow_backtrack: true
  max_backtracks: 1

calibration:
  ece_bins: 15
  conformal_alpha: 0.1
  temperature_scaling: true

eval:
  bootstrap_n: 1000
  mcnemar_alpha: 0.05
  bonferroni_correct: true

routing_analysis:
  subset_size: 500
  n_runs: 2
  expected_exact_match: 0.65

bias:
  reference_gender: "male"
  reference_region: "Americas"
  confounder_cols: ["complexity_edge_density", "img_quality_score"]
  reml: true
  bonferroni_correct: true

output:
  results_dir: "results/"
  traces_dir: "results/traces/"
  save_traces: true
  save_probs: true
