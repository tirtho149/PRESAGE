# PlantVillage (TFDS: plant_village) — training configuration for PlantSwarm
# Install: pip install tensorflow tensorflow-datasets
# First download ~828 MiB; cached under ~/tensorflow_datasets

data:
  tfds_name: "plant_village"
  tfds_split: "train"
  tfds_max_examples: 10000
  tfds_seed: 42
  image_col: "image_bytes"
  id_col: "id"
  label_cols:
    T1: "symptom_type"
    T2: "pathogen_class"
    T3: "disease_name"
    T4: "severity_class"
    T5: "crop_species"
  demographic_cols: {}
  quality_col: null
  quality_filter: null
  n_images: 10000
  calibration_split_size: 500
  stratify_by: ["crop_species", "disease_name"]
  top_k_diseases: 50
  benchmark_col: "benchmark"

labels:
  T1:
    - "Lesion"
    - "Blight"
    - "Mosaic"
    - "Wilt"
    - "Rot"
    - "Canker"
    - "Rust"
    - "Powdery mildew"
  T2:
    - "Fungal"
    - "Bacterial"
    - "Viral"
    - "Nutrient deficiency"
    - "Pest damage"
  T3: null
  T4:
    - "Healthy"
    - "Early"
    - "Moderate"
    - "Severe"
  T5:
    - "Tomato"
    - "Corn"
    - "Potato"
    - "Cassava"
    - "Grape"
    - "Apple"
    - "Cherry"
    - "Peach"
    - "Pepper"
    - "Squash"
    - "Strawberry"
    - "Orange"
    - "Soybean"
    - "Other"

model:
  backbone: "Qwen/Qwen3-VL-8B-Instruct"
  replica_backbones:
    - "microsoft/Phi-4-multimodal-instruct"
    - "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.0
  seed: 42
  max_new_tokens: 512
  image_size: 448
  vllm_base_url: "http://localhost:8000/v1"
  logprobs: true
  guided_choice: true
  prefer_structured_outputs: true
  strict_server_model: false
  top_logprobs: 20

routing:
  orchestrator: "hf_direct"
  Tmax: 15
  confidence_levels: ["high", "medium", "low"]
  confidence_weights:
    high: 3
    medium: 2
    low: 1
  allow_backtrack: true
  max_backtracks: 1
  entropy_delta1: 0.05
  entropy_delta2: 0.35

calibration:
  ece_bins: 15
  conformal_alpha: 0.1
  temperature_scaling: true

eval:
  bootstrap_n: 1000
  mcnemar_alpha: 0.05
  bonferroni_correct: true

routing_analysis:
  subset_size: 500
  n_runs: 2
  expected_exact_match: 0.65

bias:
  reference_gender: "male"
  reference_region: "Americas"
  confounder_cols: []
  reml: true
  bonferroni_correct: true

output:
  results_dir: "results/plant_village_tfds/"
  traces_dir: "results/plant_village_tfds/traces/"
  save_traces: true
  save_probs: true
