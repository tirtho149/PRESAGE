# plantwild_full_eval.yaml
# ========================
# Held-out evaluation on the COMPLETE PlantWild dataset (paper §5.3).
# Largest in-the-wild plant disease benchmark; zero overlap with Bugwood
# training images or PathomeDB construction data.

data:
  hf_dataset_id: "rashikahura/plantWild"
  hf_split: "train"
  image_col: "image_bytes"
  id_col: "id"
  label_cols:
    T1: "symptom_type"
    T2: "pathogen_class"
    T3: "disease_name"
    T4: "severity_class"
    T5: "crop_species"
  n_images: 18000               # full wild dataset
  calibration_split_size: 500

  exclude_bugwood_image_ids: true

labels:
  T1:
    - "Lesion"
    - "Blight"
    - "Mosaic"
    - "Wilt"
    - "Rot"
    - "Canker"
    - "Rust"
    - "Powdery mildew"
  T2:
    - "Fungal"
    - "Bacterial"
    - "Viral"
    - "Nutrient deficiency"
    - "Pest damage"
  T3: null
  T4:
    - "Healthy"
    - "Early"
    - "Moderate"
    - "Severe"
  T5:
    - "Tomato"
    - "Corn"
    - "Potato"
    - "Cassava"
    - "Grape"
    - "Apple"
    - "Cherry"
    - "Peach"
    - "Pepper"
    - "Squash"
    - "Strawberry"
    - "Orange"
    - "Soybean"
    - "Other"

model:
  backbone: "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.0
  seed: 42
  max_new_tokens: 512
  image_size: 448
  vllm_base_url: "http://localhost:8000/v1"

routing:
  orchestrator: "autogen_swarm"
  Tmax: 15
  confidence_weights: { high: 3, medium: 2, low: 1 }
  allow_backtrack: true
  max_backtracks: 1

pathome:
  load_dir: "artifacts/pathome_v1/"

calibration:
  ece_bins: 15
  conformal_alpha: 0.1
  temperature_scaling: true

eval:
  bootstrap_n: 1000
  mcnemar_alpha: 0.05
  bonferroni_correct: true

output:
  results_dir: "results/plantwild_full/"
  traces_dir: "results/plantwild_full/traces/"
  save_traces: true
  save_probs: true
