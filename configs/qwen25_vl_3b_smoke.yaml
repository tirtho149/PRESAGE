# Smoke run: Plant Village (TFDS) + Qwen2.5-VL-3B via vLLM (~5 images).
#
# Important: use Qwen2.5-VL-3B (vision), not text-only Qwen2.5-3B-Instruct — PlantSwarm
# sends images to /v1/chat/completions. "Hermes-style" UIs often wrap the chat template;
# vLLM uses each model's own processor.
#
# Prerequisite (Linux + NVIDIA): start the server first, e.g.
#   bash scripts/serve_vllm_qwen25_vl_3b.sh
# Then:
#   python scripts/run_plantswarm.py --config configs/qwen25_vl_3b_smoke.yaml --subset 5

data:
  parquet_path: null
  directory_root: null
  directory_layout:
    segment_tasks: null
  image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".bmp", ".tif", ".tiff"]
  follow_symlinks: false
  image_root: null
  id_col: "id"
  image_col: "image_bytes"
  tfds_name: plant_village
  tfds_data_dir: null
  tfds_split: train
  tfds_max_examples: 2000
  tfds_seed: 42
  label_cols:
    T1: "symptom_type"
    T2: "pathogen_class"
    T3: "disease_name"
    T4: "severity_class"
    T5: "crop_species"
  demographic_cols: {}
  quality_col: "img_quality"
  quality_filter: null
  n_images: 2000
  calibration_split_size: 200
  stratify_by: ["T5", "T3"]
  top_k_diseases: 50
  benchmark_col: benchmark

labels:
  T1:
    - "Lesion"
    - "Blight"
    - "Mosaic"
    - "Wilt"
    - "Rot"
    - "Canker"
    - "Rust"
    - "Powdery mildew"
  T2:
    - "Fungal"
    - "Bacterial"
    - "Viral"
    - "Nutrient deficiency"
    - "Pest damage"
  T3: null
  T4:
    - "Healthy"
    - "Early"
    - "Moderate"
    - "Severe"
  T5: null

model:
  backbone: "Qwen/Qwen2.5-VL-3B-Instruct"
  replica_backbones:
    - "Qwen/Qwen2.5-VL-3B-Instruct"
  temperature: 0.0
  seed: 42
  max_new_tokens: 512
  image_size: 448
  vllm_base_url: "http://localhost:8000/v1"
  logprobs: true
  guided_choice: true

routing:
  orchestrator: "autogen_swarm"
  Tmax: 15
  confidence_levels: ["high", "medium", "low"]
  confidence_weights:
    high: 3
    medium: 2
    low: 1
  allow_backtrack: true
  max_backtracks: 1

calibration:
  ece_bins: 15
  conformal_alpha: 0.1
  temperature_scaling: true

eval:
  bootstrap_n: 200
  mcnemar_alpha: 0.05
  bonferroni_correct: true

routing_analysis:
  subset_size: 500
  n_runs: 2
  expected_exact_match: 0.65

bias:
  reference_gender: "male"
  reference_region: "Americas"
  confounder_cols: ["complexity_edge_density", "img_quality_score"]
  reml: true
  bonferroni_correct: true

output:
  results_dir: "results/qwen25_vl_3b_n5/"
  traces_dir: "results/qwen25_vl_3b_n5/traces/"
  save_traces: true
  save_probs: true
