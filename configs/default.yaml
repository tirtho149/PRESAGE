# PlantSwarm default configuration (PlantSwarm paper / EMNLP 2026)
# Uses PlantVillage (TFDS) for training trace generation

data:
  # TensorFlow Datasets Plant Village (training)
  tfds_name: "plant_village"
  tfds_split: "train"
  tfds_max_examples: 10000
  tfds_seed: 42
  image_col: "image_bytes"
  id_col: "id"
  label_cols:
    T1: "symptom_type"
    T2: "pathogen_class"
    T3: "disease_name"
    T4: "severity_class"
    T5: "crop_species"
  demographic_cols: {}
  quality_col: null
  quality_filter: null
  n_images: 10000
  calibration_split_size: 500
  stratify_by: ["crop_species", "disease_name"]
  top_k_diseases: 50
  benchmark_col: "benchmark"

# --- Label spaces (PlantSwarm Table: tasks); T3 extended with top-k + Other from data ---
labels:
  T1:
    - "Lesion"
    - "Blight"
    - "Mosaic"
    - "Wilt"
    - "Rot"
    - "Canker"
    - "Rust"
    - "Powdery mildew"
  T2:
    - "Fungal"
    - "Bacterial"
    - "Viral"
    - "Nutrient deficiency"
    - "Pest damage"
  T3: null
  T4:
    - "Healthy"
    - "Early"
    - "Moderate"
    - "Severe"
  T5:
    - "Tomato"
    - "Corn"
    - "Potato"
    - "Cassava"
    - "Grape"
    - "Apple"
    - "Cherry"
    - "Peach"
    - "Pepper"
    - "Squash"
    - "Strawberry"
    - "Orange"
    - "Soybean"
    - "Other"

# --- vLLM / model (paper §Implementation) ---
model:
  backbone: "Qwen/Qwen3-VL-8B-Instruct"
  replica_backbones:
    - "microsoft/Phi-4-multimodal-instruct"
    - "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.0
  seed: 42
  max_new_tokens: 512
  image_size: 448
  vllm_base_url: "http://localhost:8000/v1"
  # Chat token logprobs (entropy_routing always forces True). Used by VLLMClient.chat_with_logprobs.
  logprobs: true
  # Constrained label scoring (Appendix B); vision-conditioned when image is present.
  guided_choice: true
  # vLLM ≥0.12: structured_outputs.choice; set false to prefer legacy guided_choice only.
  prefer_structured_outputs: true
  # If true, require GET /v1/models to list model.backbone before running (fail-fast).
  strict_server_model: false
  # Chat logprobs depth for token-level entropy (entropy_routing orchestrator)
  top_logprobs: 20

# --- PlantSwarm routing ---
routing:
  orchestrator: "autogen_swarm"
  Tmax: 15
  confidence_levels: ["high", "medium", "low"]
  confidence_weights:
    high: 3
    medium: 2
    low: 1
  allow_backtrack: true
  max_backtracks: 1
  # Entropy-driven routing (scripts/run_plantswarm.py --orchestrator entropy_routing)
  entropy_delta1: 0.05   # G_t > δ_1 → MorphologyAgent (backtrack)
  entropy_delta2: 0.35     # H_t < δ_2 → DiagnosisAgent (early terminate)

calibration:
  ece_bins: 15
  conformal_alpha: 0.1
  temperature_scaling: true

eval:
  bootstrap_n: 1000
  mcnemar_alpha: 0.05
  bonferroni_correct: true

routing_analysis:
  subset_size: 500
  n_runs: 2
  expected_exact_match: 0.65

bias:
  # Used only when ``data.demographic_cols`` maps to real columns (e.g. site / annotator).
  reference_gender: "male"
  reference_region: "Americas"
  confounder_cols: ["complexity_edge_density", "img_quality_score"]
  reml: true
  bonferroni_correct: true

output:
  results_dir: "results/"
  traces_dir: "results/traces/"
  save_traces: true
  save_probs: true
