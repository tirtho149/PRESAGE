# plantvillage_full_eval.yaml
# ===========================
# Held-out evaluation on the COMPLETE PlantVillage dataset (paper §5.2).
# 54,306 controlled images, 38 disease classes, 14 crop species.
#
# 26 classes have Bugwood training traces (seen).
# 12 classes have ZERO training traces (unseen) -> embedded zero-shot via
# PathomeDB pathway transfer (paper P5 -> target T3 F1 >= 0.40).

data:
  tfds_name: "plant_village"
  tfds_split: "train"             # PlantVillage TFDS has no test split — use full
  tfds_max_examples: 54306        # the complete dataset
  tfds_seed: 42
  image_col: "image_bytes"
  id_col: "id"
  label_cols:
    T1: "symptom_type"
    T2: "pathogen_class"
    T3: "disease_name"
    T4: "severity_class"
    T5: "crop_species"
  benchmark_col: "benchmark"
  calibration_split_size: 500

  # Held-out flag: ensure no Bugwood image_id appears here.
  exclude_bugwood_image_ids: true

# Same 26-class label space as bugwood_pathome.yaml; the 12 unseen classes
# are reported as a separate evaluation slice.
labels:
  T1:
    - "Lesion"
    - "Blight"
    - "Mosaic"
    - "Wilt"
    - "Rot"
    - "Canker"
    - "Rust"
    - "Powdery mildew"
  T2:
    - "Fungal"
    - "Bacterial"
    - "Viral"
    - "Nutrient deficiency"
    - "Pest damage"
  T3: null
  T4:
    - "Healthy"
    - "Early"
    - "Moderate"
    - "Severe"
  T5:
    - "Tomato"
    - "Corn"
    - "Potato"
    - "Cassava"
    - "Grape"
    - "Apple"
    - "Cherry"
    - "Peach"
    - "Pepper"
    - "Squash"
    - "Strawberry"
    - "Orange"
    - "Soybean"
    - "Other"

model:
  backbone: "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.0              # deterministic at eval
  seed: 42
  max_new_tokens: 512
  image_size: 448
  vllm_base_url: "http://localhost:8000/v1"

routing:
  orchestrator: "autogen_swarm"
  Tmax: 15
  confidence_weights: { high: 3, medium: 2, low: 1 }
  allow_backtrack: true
  max_backtracks: 1

pathome:
  load_dir: "artifacts/pathome_v1/"     # produced by bugwood_pathome run

calibration:
  ece_bins: 15
  conformal_alpha: 0.1
  temperature_scaling: true

eval:
  bootstrap_n: 1000
  mcnemar_alpha: 0.05
  bonferroni_correct: true
  zero_shot_classes: 12              # paper §5.2 — reported separately

output:
  results_dir: "results/plantvillage_full/"
  traces_dir: "results/plantvillage_full/traces/"
  save_traces: true
  save_probs: true
